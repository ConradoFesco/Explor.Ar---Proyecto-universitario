{% extends "layout.html" %}
{% block content %}
<div class="p-6">
  <h1 class="text-2xl font-semibold mb-6">Flags</h1>
  
  <table class="min-w-full bg-white border border-gray-200 rounded-lg shadow-sm">
    <thead class="bg-gray-100">
      <tr>
        <th class="px-6 py-3 text-left font-medium text-gray-600">Nombre</th>
        <th class="px-6 py-3 text-left font-medium text-gray-600">Descripción</th>
        <th class="px-6 py-3 text-left font-medium text-gray-600">Estado</th>
        <th class="px-6 py-3 text-left font-medium text-gray-600">Última modificación</th>
      </tr>
    </thead>
    <tbody>
      {% for flag in flags %}
      <tr class="border-t hover:bg-gray-50 transition">
        <td class="px-6 py-3 text-gray-800">{{ flag.name }}</td>
        <td class="px-6 py-3 text-gray-700">{{ flag.description }}</td>
        <td class="px-6 py-3">
          <button
            hx-post="{{ url_for('flag_api.toggle_flag_route', flag_id=flag.id) }}"
            hx-trigger="click"
            hx-target="closest tr"
            hx-swap="outerHTML"
            class="px-4 py-1.5 rounded-full font-semibold text-sm text-white shadow-md transition-colors duration-200
              {% if flag.status %}
                bg-green-500 hover:bg-green-600
              {% else %}
                bg-red-500 hover:bg-red-600
              {% endif %}">
            {{ 'ON' if flag.enabled else 'OFF' }}
          </button>
        </td>
        <td class="px-6 py-3 text-gray-600">
          {{ flag.last_modified_by }} — {{ flag.last_modified_by }}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
