{% extends 'shared/layout.html' %}

{% block content %}
<div class="max-w-6xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Listado de Sitios Históricos</h2>
            <a href="{{ url_for('main.alta_sitios') }}" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                + Agregar Sitio Histórico
            </a>
        </div>

        <!-- Controles de búsqueda y filtrado -->
        <div class="bg-gray-50 rounded-lg p-4 mb-6">
            <!-- Barra de búsqueda y ordenamiento -->
            <div class="flex flex-wrap gap-4 mb-4">
                <!-- Búsqueda por texto -->
                <div class="flex-1 min-w-64">
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="Buscar por nombre o descripción..." 
                               class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-search text-gray-400"></i>
                        </div>
                    </div>
                </div>
                
                <!-- Ordenamiento -->
                <div class="flex gap-2">
                    <select id="sort-by" class="px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="created_at">Fecha de registro</option>
                        <option value="name">Nombre</option>
                        <option value="city">Ciudad</option>
                    </select>
                    <select id="sort-order" class="px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="desc">Descendente</option>
                        <option value="asc">Ascendente</option>
                    </select>
                </div>
                
                <!-- Botón de filtros -->
                <button id="toggle-filters" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg transition duration-200 flex items-center gap-2">
                    <i class="fas fa-filter"></i>
                    Filtros
                </button>
                
                <!-- Botón de exportación CSV -->
                <button id="export-csv-btn" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg transition duration-200 flex items-center gap-2">
                    <i class="fas fa-download"></i>
                    Exportar CSV
                </button>
            </div>

            <!-- Panel de filtros (inicialmente oculto) -->
            <div id="filters-panel" class="hidden border-t border-gray-200 pt-4">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Filtro por ciudad -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ciudad</label>
                        <select id="filter-city" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Todas las ciudades</option>
                        </select>
                    </div>
                    
                    <!-- Filtro por provincia -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Provincia</label>
                        <select id="filter-province" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Todas las provincias</option>
                        </select>
                    </div>
                    
                    <!-- Filtro por estado -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Estado del sitio</label>
                        <select id="filter-state" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Todos los estados</option>
                        </select>
                    </div>
                    
                    <!-- Filtro por visibilidad -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Visibilidad</label>
                        <select id="filter-visible" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Todos</option>
                            <option value="true">Visible</option>
                            <option value="false">No visible</option>
                        </select>
                    </div>
                    
                    <!-- Filtro por rango de fechas -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Fecha desde</label>
                        <input type="date" id="filter-date-from" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Fecha hasta</label>
                        <input type="date" id="filter-date-to" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <!-- Filtro por tags -->
                <div class="mt-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Tags</label>
                    <div id="tags-filter-container" class="flex flex-wrap gap-2">
                        <!-- Los tags se cargarán dinámicamente -->
                    </div>
                </div>
                
                <!-- Botones de acción -->
                <div class="flex justify-end gap-3 mt-4 pt-4 border-t border-gray-200">
                    <button id="clear-filters" class="px-4 py-2 text-gray-600 hover:text-gray-800 transition duration-200">
                        Limpiar filtros
                    </button>
                    <button id="apply-filters" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition duration-200">
                        Aplicar filtros
                    </button>
                </div>
            </div>
        </div>
        <div id="loading-message" class="text-center text-gray-500">Cargando sitios...</div>
        <ul id="sites-list" class="divide-y divide-gray-200 hidden"></ul>
        <div id="no-sites-message" class="text-center text-gray-500 hidden">No hay sitios históricos para mostrar.</div>
        
        <!-- Controles de paginación -->
        <div id="pagination-controls" class="pagination hidden"></div>
        <div id="pagination-info" class="pagination-info hidden"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }} <script>
    let currentPage = 1;
    const perPage = 25;
    let filterOptions = null;
    let currentFilters = {
        search: '',
        sort_by: 'created_at',
        sort_order: 'desc',
        city_id: '',
        province_id: '',
        tag_ids: [],
        state_id: '',
        date_from: '',
        date_to: '',
        visible: ''
    };

    document.addEventListener('DOMContentLoaded', () => {
        loadFilterOptions();
        loadSites(currentPage);
        setupEventListeners();
    });

    function setupEventListeners() {
        // Búsqueda
        const searchInput = document.getElementById('search-input');
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentFilters.search = e.target.value;
                currentPage = 1;
                loadSites(currentPage);
            }, 500); // Debounce de 500ms
        });

        // Ordenamiento
        document.getElementById('sort-by').addEventListener('change', (e) => {
            currentFilters.sort_by = e.target.value;
            currentPage = 1;
            loadSites(currentPage);
        });

        document.getElementById('sort-order').addEventListener('change', (e) => {
            currentFilters.sort_order = e.target.value;
            currentPage = 1;
            loadSites(currentPage);
        });

        // Toggle de filtros
        document.getElementById('toggle-filters').addEventListener('click', () => {
            const panel = document.getElementById('filters-panel');
            panel.classList.toggle('hidden');
        });

        // Filtros
        document.getElementById('filter-city').addEventListener('change', (e) => {
            currentFilters.city_id = e.target.value;
        });

        document.getElementById('filter-province').addEventListener('change', (e) => {
            currentFilters.province_id = e.target.value;
        });

        document.getElementById('filter-state').addEventListener('change', (e) => {
            currentFilters.state_id = e.target.value;
        });

        document.getElementById('filter-visible').addEventListener('change', (e) => {
            currentFilters.visible = e.target.value;
        });

        document.getElementById('filter-date-from').addEventListener('change', (e) => {
            currentFilters.date_from = e.target.value;
        });

        document.getElementById('filter-date-to').addEventListener('change', (e) => {
            currentFilters.date_to = e.target.value;
        });

        // Botones de filtros
        document.getElementById('apply-filters').addEventListener('click', () => {
            currentPage = 1;
            loadSites(currentPage);
        });

        document.getElementById('clear-filters').addEventListener('click', () => {
            clearFilters();
        });

        // Botón de exportación CSV
        document.getElementById('export-csv-btn').addEventListener('click', () => {
            exportSitesToCSV();
        });
    }

    function loadFilterOptions() {
        fetch('{{ url_for("site_api.get_filter_options") }}')
            .then(response => response.json())
            .then(data => {
                filterOptions = data;
                populateFilterOptions();
            })
            .catch(error => {
                console.error('Error loading filter options:', error);
            });
    }

    function populateFilterOptions() {
        if (!filterOptions) return;

        // Poblar ciudades
        const citySelect = document.getElementById('filter-city');
        filterOptions.cities.forEach(city => {
            const option = document.createElement('option');
            option.value = city.id;
            option.textContent = city.name;
            citySelect.appendChild(option);
        });

        // Poblar provincias
        const provinceSelect = document.getElementById('filter-province');
        filterOptions.provinces.forEach(province => {
            const option = document.createElement('option');
            option.value = province.id;
            option.textContent = province.name;
            provinceSelect.appendChild(option);
        });

        // Poblar estados
        const stateSelect = document.getElementById('filter-state');
        filterOptions.states.forEach(state => {
            const option = document.createElement('option');
            option.value = state.id;
            option.textContent = state.name;
            stateSelect.appendChild(option);
        });

        // Poblar tags
        const tagsContainer = document.getElementById('tags-filter-container');
        filterOptions.tags.forEach(tag => {
            const tagElement = document.createElement('div');
            tagElement.className = 'flex items-center';
            tagElement.innerHTML = `
                <input type="checkbox" id="tag-${tag.id}" value="${tag.id}" 
                       class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                <label for="tag-${tag.id}" class="ml-2 text-sm text-gray-700 cursor-pointer">
                    ${tag.name}
                </label>
            `;
            tagsContainer.appendChild(tagElement);

            // Event listener para el checkbox
            tagElement.querySelector('input').addEventListener('change', (e) => {
                if (e.target.checked) {
                    if (!currentFilters.tag_ids.includes(tag.id)) {
                        currentFilters.tag_ids.push(tag.id);
                    }
                } else {
                    currentFilters.tag_ids = currentFilters.tag_ids.filter(id => id !== tag.id);
                }
            });
        });
    }

    function clearFilters() {
        currentFilters = {
            search: '',
            sort_by: 'created_at',
            sort_order: 'desc',
            city_id: '',
            province_id: '',
            tag_ids: [],
            state_id: '',
            date_from: '',
            date_to: '',
            visible: ''
        };

        // Limpiar inputs
        document.getElementById('search-input').value = '';
        document.getElementById('sort-by').value = 'created_at';
        document.getElementById('sort-order').value = 'desc';
        document.getElementById('filter-city').value = '';
        document.getElementById('filter-province').value = '';
        document.getElementById('filter-state').value = '';
        document.getElementById('filter-visible').value = '';
        document.getElementById('filter-date-from').value = '';
        document.getElementById('filter-date-to').value = '';

        // Limpiar checkboxes de tags
        document.querySelectorAll('#tags-filter-container input[type="checkbox"]').forEach(checkbox => {
            checkbox.checked = false;
        });

        currentPage = 1;
        loadSites(currentPage);
    }

    function buildApiUrl(page) {
        const params = new URLSearchParams({
            page: page,
            per_page: perPage,
            sort_by: currentFilters.sort_by,
            sort_order: currentFilters.sort_order
        });

        if (currentFilters.search) params.append('search', currentFilters.search);
        if (currentFilters.city_id) params.append('city_id', currentFilters.city_id);
        if (currentFilters.province_id) params.append('province_id', currentFilters.province_id);
        if (currentFilters.state_id) params.append('state_id', currentFilters.state_id);
        if (currentFilters.visible !== '') params.append('visible', currentFilters.visible === 'true' ? 'true' : 'false');
        if (currentFilters.date_from) params.append('date_from', currentFilters.date_from);
        if (currentFilters.date_to) params.append('date_to', currentFilters.date_to);
        if (currentFilters.tag_ids.length > 0) params.append('tag_ids', currentFilters.tag_ids.join(','));

        return `{{ url_for("site_api.get_all_historic_sites") }}?${params.toString()}`;
    }

    function loadSites(page) {
        const sitesList = document.getElementById('sites-list');
        const loadingMessage = document.getElementById('loading-message');
        const noSitesMessage = document.getElementById('no-sites-message');
        const paginationControls = document.getElementById('pagination-controls');
        const paginationInfo = document.getElementById('pagination-info');
        
        // Limpiar contenido anterior
        sitesList.innerHTML = '';
        paginationControls.innerHTML = '';
        paginationInfo.innerHTML = '';
        
        // Mostrar loading
        loadingMessage.classList.remove('hidden');
        sitesList.classList.add('hidden');
        noSitesMessage.classList.add('hidden');
        paginationControls.classList.add('hidden');
        paginationInfo.classList.add('hidden');
        document.getElementById('export-csv-btn').classList.add('hidden');
        
        const API_URL = buildApiUrl(page);
        
        fetch(API_URL)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                loadingMessage.classList.add('hidden');
                
                if (data.sites.length === 0) {
                    noSitesMessage.classList.remove('hidden');
                    document.getElementById('export-csv-btn').classList.add('hidden');
                    return;
                }
                
                // Mostrar sitios
                sitesList.classList.remove('hidden');
                document.getElementById('export-csv-btn').classList.remove('hidden');
                data.sites.forEach(site => {
                    const listItem = document.createElement('li');
                    listItem.className = 'py-4 flex justify-between items-center';
                    
                    // Generar badges de tags
                    const tagsHTML = site.tags && site.tags.length > 0 
                        ? `<div class="flex flex-wrap gap-1 mt-2">${site.tags.map(tag => 
                            `<span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                                ${tag.name}
                            </span>`
                        ).join('')}</div>`
                        : '';
                    
                    // Información adicional del sitio
                    const additionalInfo = [];
                    if (site.city_name) additionalInfo.push(`<span class="text-xs text-gray-500">📍 ${site.city_name}</span>`);
                    if (site.created_at) {
                        const date = new Date(site.created_at);
                        additionalInfo.push(`<span class="text-xs text-gray-500">📅 ${date.toLocaleDateString('es-ES')}</span>`);
                    }
                    if (site.visible !== undefined) {
                        const visibilityIcon = site.visible ? '👁️' : '🚫';
                        additionalInfo.push(`<span class="text-xs text-gray-500">${visibilityIcon} ${site.visible ? 'Visible' : 'No visible'}</span>`);
                    }
                    
                    const additionalInfoHTML = additionalInfo.length > 0 
                        ? `<div class="flex flex-wrap gap-2 mt-1">${additionalInfo.join('')}</div>`
                        : '';
                    
                    listItem.innerHTML = `
                        <div class="flex-1">
                            <span class="text-lg font-medium text-gray-700">${site.name}</span>
                            <p class="text-sm text-gray-500 mt-1">${site.brief_description}</p>
                            ${additionalInfoHTML}
                            ${tagsHTML}
                        </div>
                        <button onclick="viewSiteDetail(${site.id})" 
                                class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                            Ver Detalle
                        </button>
                    `;
                    sitesList.appendChild(listItem);
                });
                
                // Mostrar controles de paginación
                renderPagination(data.pagination);
                currentPage = page;
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                loadingMessage.textContent = 'Error al cargar los datos.';
                loadingMessage.classList.remove('hidden');
                sitesList.classList.add('hidden');
                document.getElementById('export-csv-btn').classList.add('hidden');
            });
    }

    function renderPagination(pagination) {
        const paginationControls = document.getElementById('pagination-controls');
        const paginationInfo = document.getElementById('pagination-info');
        if (pagination.pages <= 1) {
            return; // No mostrar controles si hay solo una página
        }
        // Información de paginación
        const startItem = (pagination.page - 1) * pagination.per_page + 1;
        const endItem = Math.min(pagination.page * pagination.per_page, pagination.total);
        paginationInfo.innerHTML = `Mostrando ${startItem}-${endItem} de ${pagination.total} sitios históricos`;
        paginationInfo.classList.remove('hidden');
        // Botón Anterior
        const prevButton = document.createElement('button');
        prevButton.innerHTML = '← Anterior';
        prevButton.disabled = !pagination.has_prev;
        prevButton.onclick = () => loadSites(pagination.prev_num);
        paginationControls.appendChild(prevButton);
        // Números de página
        const startPage = Math.max(1, pagination.page - 2);
        const endPage = Math.min(pagination.pages, pagination.page + 2);
        if (startPage > 1) {
            const firstButton = document.createElement('button');
            firstButton.textContent = '1';
            firstButton.onclick = () => loadSites(1);
            paginationControls.appendChild(firstButton);
            
            if (startPage > 2) {
                const ellipsis = document.createElement('span');
                ellipsis.textContent = '...';
                ellipsis.className = 'px-2 text-gray-500';
                paginationControls.appendChild(ellipsis);
            }
        }
        for (let i = startPage; i <= endPage; i++) {
            const pageButton = document.createElement('button');
            pageButton.textContent = i;
            pageButton.className = i === pagination.page ? 'active' : '';
            pageButton.onclick = () => loadSites(i);
            paginationControls.appendChild(pageButton);
        }
        if (endPage < pagination.pages) {
            if (endPage < pagination.pages - 1) {
                const ellipsis = document.createElement('span');
                ellipsis.textContent = '...';
                ellipsis.className = 'px-2 text-gray-500';
                paginationControls.appendChild(ellipsis);
            }
            const lastButton = document.createElement('button');
            lastButton.textContent = pagination.pages;
            lastButton.onclick = () => loadSites(pagination.pages);
            paginationControls.appendChild(lastButton);
        }
        // Botón Siguiente
        const nextButton = document.createElement('button');
        nextButton.innerHTML = 'Siguiente →';
        nextButton.disabled = !pagination.has_next;
        nextButton.onclick = () => loadSites(pagination.next_num);
        paginationControls.appendChild(nextButton);
        
        paginationControls.classList.remove('hidden');
    }

    // Función específica para sitios históricos
    function viewSiteDetail(siteId) {
        const url = `{{ url_for("site_api.get_historic_site", id=0) }}`.replace('0', siteId);
        const title = 'Detalle del Sitio Histórico';
        // Usar la función genérica del layout
        loadModalContent(url, title, renderSiteDetail);
    }

    // Función específica para renderizar detalles de sitios históricos
    function renderSiteDetail(site) {
        return `
            <div class="space-y-6">
                <!-- Información principal -->
                <div class="border-b pb-4">
                    <h4 class="text-xl font-bold text-gray-800 mb-2">${site.name}</h4>
                    <p class="text-gray-600 leading-relaxed">${site.brief_description}</p>
                </div>
                
                <!-- Descripción completa -->
                ${site.complete_description ? `
                    <div>
                        <h5 class="font-semibold text-gray-700 mb-2">Descripción completa</h5>
                        <p class="text-gray-600 leading-relaxed">${site.complete_description}</p>
                    </div>
                ` : ''}
                
                <!-- Información geográfica -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-3 rounded-lg">
                        <h6 class="font-medium text-gray-700 mb-1">Coordenadas</h6>
                        <p class="text-sm text-gray-600">Lat: ${site.latitude}</p>
                        <p class="text-sm text-gray-600">Lng: ${site.longitude}</p>
                    </div>
                    
                    ${site.year_inauguration ? `
                        <div class="bg-gray-50 p-3 rounded-lg">
                            <h6 class="font-medium text-gray-700 mb-1">Año de inauguración</h6>
                            <p class="text-sm text-gray-600">${site.year_inauguration}</p>
                        </div>
                    ` : ''}
                </div>
                
                <!-- Tags del sitio -->
                ${site.tags && site.tags.length > 0 ? `
                    <div>
                        <h5 class="font-semibold text-gray-700 mb-2">Tags asociados</h5>
                        <div class="flex flex-wrap gap-2">
                            ${site.tags.map(tag => `
                                <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-blue-100 text-blue-800">
                                    ${tag.name}
                                </span>
                            `).join('')}
                        </div>
                    </div>
                ` : `
                    <div>
                        <h5 class="font-semibold text-gray-700 mb-2">Tags asociados</h5>
                        <p class="text-gray-500 text-sm">Este sitio no tiene tags asociados</p>
                    </div>
                `}
                
                <!-- Información de relaciones -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
                    ${site.city_name ? `
                        <div class="text-center p-2 bg-blue-50 rounded">
                            <span class="font-medium text-blue-700">Ciudad</span>
                            <p class="text-blue-600">${site.city_name}</p>
                        </div>
                    ` : ''}
                    ${site.state_name ? `
                        <div class="text-center p-2 bg-green-50 rounded">
                            <span class="font-medium text-green-700">Estado</span>
                            <p class="text-green-600">${site.state_name}</p>
                        </div>
                    ` : ''}
                    ${site.category_name ? `
                        <div class="text-center p-2 bg-purple-50 rounded">
                            <span class="font-medium text-purple-700">Categoría</span>
                            <p class="text-purple-600">${site.category_name}</p>
                        </div>
                    ` : ''}
                </div>
                
                <!-- Botones de acción -->
                <div class="flex flex-wrap gap-3 pt-4 border-t border-gray-100 justify-end">
                    <button onclick="editSiteTags(${site.id})" 
                            class="group bg-indigo-50 hover:bg-indigo-100 text-indigo-600 border border-indigo-200 hover:border-indigo-300 font-medium py-2.5 px-4 rounded-lg transition-all duration-200 shadow-sm hover:shadow-md hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:ring-opacity-50">
                        <i class="fas fa-tags mr-2 group-hover:scale-110 transition-transform duration-200"></i>Editar Tags
                    </button>
                    <button onclick="modifySite(${site.id})" 
                            class="group bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 hover:border-amber-300 font-medium py-2.5 px-4 rounded-lg transition-all duration-200 shadow-sm hover:shadow-md hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-amber-200 focus:ring-opacity-50">
                        <i class="fas fa-edit mr-2 group-hover:scale-110 transition-transform duration-200"></i>Modificar
                    </button>
                    <button onclick="deleteSite(${site.id})" 
                            class="group bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 hover:border-red-300 font-medium py-2.5 px-4 rounded-lg transition-all duration-200 shadow-sm hover:shadow-md hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-red-200 focus:ring-opacity-50">
                        <i class="fas fa-trash mr-2 group-hover:scale-110 transition-transform duration-200"></i>Eliminar
                    </button>
                    <button onclick="viewEventsHistory(${site.id})"

    // Función para cargar opciones de filtros de eventos
    async function loadEventFilterOptions(siteId) {
        try {
            // Cargar todos los eventos para obtener usuarios y tipos únicos
            const response = await fetch(`{{ url_for("event_api.get_all_events", id=0) }}`.replace('0', siteId) + '?per_page=1000');
            if (!response.ok) throw new Error('Error al cargar eventos');
            
            const data = await response.json();
            const events = data.events || [];
            
            // Extraer usuarios únicos
            const usersMap = new Map();
            const typesSet = new Set();
            
            events.forEach(event => {
                if (event.id_user && event.user_name) {
                    usersMap.set(event.id_user, {
                        id: event.id_user,
                        name: `${event.user_name} ${event.user_last_name || ''}`.trim()
                    });
                }
                if (event.type_Action) {
                    typesSet.add(event.type_Action);
                }
            });
            
            // Poblar select de usuarios
            const userSelect = document.getElementById('event-filter-user');
            if (userSelect) {
                usersMap.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.id;
                    option.textContent = user.name;
                    userSelect.appendChild(option);
                });
            }
            
            // Poblar select de tipos de acción
            const typeSelect = document.getElementById('event-filter-type');
            if (typeSelect) {
                Array.from(typesSet).sort().forEach(type => {
                    const option = document.createElement('option');
                    option.value = type;
                    option.textContent = type;
                    typeSelect.appendChild(option);
                });
            }
            
        } catch (error) {
            console.error('Error cargando opciones de filtros:', error);
        }
    }

    // Función para cargar eventos de un sitio con filtros
    async function loadEventsForSite(siteId, page = 1) {
        const container = document.getElementById('events-list-container');
        const paginationContainer = document.getElementById('events-pagination-container');
        const paginationInfo = document.getElementById('events-pagination-info');
        const paginationControls = document.getElementById('events-pagination-controls');
        
        // Mostrar loading
        container.innerHTML = `
            <div class="text-center text-gray-500 py-8">
                <i class="fas fa-spinner fa-spin text-3xl mb-4"></i>
                <p>Cargando eventos...</p>
            </div>
        `;
        
        try {
            // Construir URL con filtros
            const params = new URLSearchParams({
                page: page,
                per_page: eventsPerPage
            });
            
            if (currentEventFilters.user_id) params.append('user_id', currentEventFilters.user_id);
            if (currentEventFilters.type_action) params.append('type_action', currentEventFilters.type_action);
            if (currentEventFilters.date_from) params.append('date_from', currentEventFilters.date_from);
            if (currentEventFilters.date_to) params.append('date_to', currentEventFilters.date_to);
            
            const url = `{{ url_for("event_api.get_all_events", id=0) }}`.replace('0', siteId) + '?' + params.toString();
            
            const response = await fetch(url);
            if (!response.ok) throw new Error('Error al cargar eventos');
            
            const data = await response.json();
            const events = data.events || [];
            const pagination = data.pagination || {};
            
            // Renderizar eventos
            if (events.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <i class="fas fa-calendar-times text-4xl mb-4"></i>
                        <p>No hay eventos que coincidan con los filtros seleccionados.</p>
                    </div>
                `;
                paginationContainer.classList.add('hidden');
            } else {
                container.innerHTML = renderEventsList(events);
                
                // Renderizar paginación
                if (pagination.pages > 1) {
                    paginationContainer.classList.remove('hidden');
                    renderEventsPagination(pagination);
                } else {
                    paginationContainer.classList.add('hidden');
                }
            }
            
        } catch (error) {
            console.error('Error cargando eventos:', error);
            container.innerHTML = `
                <div class="text-red-600 text-center py-8">
                    <i class="fas fa-exclamation-triangle text-4xl mb-4"></i>
                    <p class="text-lg font-semibold mb-2">Error al cargar eventos</p>
                    <p class="text-sm">${error.message || 'Error desconocido'}</p>
                </div>
            `;
            paginationContainer.classList.add('hidden');
        }
    }

    // Función para renderizar la lista de eventos
    function renderEventsList(events) {
        let html = '<div class="space-y-3">';
        
        events.forEach(event => {
            // Formatear la fecha
            let formattedDate = 'Sin fecha';
            if (event.date_time) {
                try {
                    const date = new Date(event.date_time);
                    formattedDate = date.toLocaleString('es-ES', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                } catch (e) {
                    formattedDate = event.date_time;
                }
            }
            
            html += `
                <div class="border border-gray-200 rounded-lg p-4 hover:bg-gray-50 transition duration-200">
                    <div class="flex justify-between items-start mb-2">
                        <h5 class="font-semibold text-gray-800">${event.type_Action || 'Acción sin especificar'}</h5>
                        <span class="text-sm text-gray-500">${formattedDate}</span>
                    </div>
                    <div class="flex items-center text-sm text-gray-600">
                        <i class="fas fa-user mr-2"></i>
                        <span>Realizado por: ${event.user_name || 'Usuario'} ${event.user_last_name || ''}</span>
                    </div>
                </div>
            `;
        });
        
        html += '</div>';
        return html;
    }

    // Función para renderizar la paginación de eventos
    function renderEventsPagination(pagination) {
        const paginationInfo = document.getElementById('events-pagination-info');
        const paginationControls = document.getElementById('events-pagination-controls');
        
        // Información de paginación
        const startItem = (pagination.page - 1) * pagination.per_page + 1;
        const endItem = Math.min(pagination.page * pagination.per_page, pagination.total);
        paginationInfo.innerHTML = `Mostrando ${startItem}-${endItem} de ${pagination.total} eventos`;
        
        // Limpiar controles previos
        paginationControls.innerHTML = '';
        
        // Botón Anterior
        const prevButton = document.createElement('button');
        prevButton.innerHTML = '← Anterior';
        prevButton.disabled = !pagination.has_prev;
        prevButton.onclick = () => {
            currentEventPage = pagination.prev_num;
            loadEventsForSite(currentEventSiteId, currentEventPage);
        };
        paginationControls.appendChild(prevButton);
        
        // Números de página
        const startPage = Math.max(1, pagination.page - 2);
        const endPage = Math.min(pagination.pages, pagination.page + 2);
        
        if (startPage > 1) {
            const firstButton = document.createElement('button');
            firstButton.textContent = '1';
            firstButton.onclick = () => {
                currentEventPage = 1;
                loadEventsForSite(currentEventSiteId, 1);
            };
            paginationControls.appendChild(firstButton);
            
            if (startPage > 2) {
                const ellipsis = document.createElement('span');
                ellipsis.textContent = '...';
                ellipsis.className = 'px-2 text-gray-500';
                paginationControls.appendChild(ellipsis);
            }
        }
        
        for (let i = startPage; i <= endPage; i++) {
            const pageButton = document.createElement('button');
            pageButton.textContent = i;
            pageButton.className = i === pagination.page ? 'active' : '';
            pageButton.onclick = () => {
                currentEventPage = i;
                loadEventsForSite(currentEventSiteId, i);
            };
            paginationControls.appendChild(pageButton);
        }
        
        if (endPage < pagination.pages) {
            if (endPage < pagination.pages - 1) {
                const ellipsis = document.createElement('span');
                ellipsis.textContent = '...';
                ellipsis.className = 'px-2 text-gray-500';
                paginationControls.appendChild(ellipsis);
            }
            
            const lastButton = document.createElement('button');
            lastButton.textContent = pagination.pages;
            lastButton.onclick = () => {
                currentEventPage = pagination.pages;
                loadEventsForSite(currentEventSiteId, pagination.pages);
            };
            paginationControls.appendChild(lastButton);
        }
        
        // Botón Siguiente
        const nextButton = document.createElement('button');
        nextButton.innerHTML = 'Siguiente →';
        nextButton.disabled = !pagination.has_next;
        nextButton.onclick = () => {
            currentEventPage = pagination.next_num;
            loadEventsForSite(currentEventSiteId, currentEventPage);
        };
        paginationControls.appendChild(nextButton);
    }

    // Función para aplicar filtros de eventos
    function applyEventFilters() {
        currentEventFilters.user_id = document.getElementById('event-filter-user').value;
        currentEventFilters.type_action = document.getElementById('event-filter-type').value;

    // Variable global para el editor de tags
    let tagsEditor = null;

    // Función para inicializar el editor de tags
    async function initializeTagsEditor(siteId) {
        try {
            // Obtener los tags actuales del sitio
            const siteResponse = await fetch(`{{ url_for("site_api.get_historic_site", id=0) }}`.replace('0', siteId));
            if (!siteResponse.ok) {
                throw new Error('Error al cargar los datos del sitio');
            }
            const siteData = await siteResponse.json();
            
            // Obtener todos los tags disponibles
            const tagsResponse = await fetch('/api/tags');
            if (!tagsResponse.ok) {
                throw new Error('Error al cargar los tags disponibles');
            }
            const tagsData = await tagsResponse.json();
            // El endpoint devuelve un objeto con 'tags' y 'pagination', necesitamos solo los tags
            const allTags = tagsData.tags || tagsData;
            
            // Crear el selector de tags
            tagsEditor = new TagEditor('tags-editor-container', allTags, siteData.tags || []);
            
        } catch (error) {
            console.error('Error inicializando editor de tags:', error);
            document.getElementById('tags-editor-container').innerHTML = 
                `<div class="text-red-600 text-center py-4">Error al cargar los datos: ${error.message}</div>`;
        }
    }

    // Función para guardar los tags del sitio
    async function saveSiteTags(siteId) {
        if (!tagsEditor) {
            alert('Error: Editor de tags no inicializado');
            return;
        }
        
        const selectedTags = tagsEditor.getSelectedTags();
        const tagIds = selectedTags.map(tag => tag.id);
        
        try {
            const response = await fetch(`{{ url_for("site_api.update_site_tags", site_id=0) }}`.replace('0', siteId), {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    tag_ids: tagIds
                })
            });
            
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || 'Error al guardar los tags');
            }
            
            const result = await response.json();
            
            // Mostrar mensaje de éxito con SweetAlert2
            Swal.fire({
                icon: 'success',
                title: '¡Tags actualizados!',
                text: result.message || 'Los tags se han actualizado correctamente',
                confirmButtonColor: '#3B82F6',
                timer: 2000,
                showConfirmButton: false
            }).then(() => {
                // Cerrar el modal y recargar la lista
                closeModal();
                loadSites(currentPage);
            });
            
        } catch (error) {
            console.error('Error guardando tags:', error);
            Swal.fire({
                icon: 'error',
                title: 'Error',
                text: 'Error al guardar los tags: ' + error.message,
                confirmButtonColor: '#dc2626'
            });
        }
    }

    // Clase para el editor de tags

                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Bind events
            const searchInput = document.getElementById('tag-search-editor');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    this.filterTags(e.target.value);
                });
            }
            
            // Hacer disponible globalmente para el botón
            window.tagsEditor = this;
        }

        renderTagsList(filteredTags = null) {
            const tagsToRender = filteredTags || this.allTags;
            
            if (tagsToRender.length === 0) {
                return '<div class="text-center text-gray-500 py-4">No se encontraron tags</div>';
            }

            return tagsToRender.map(tag => `
                <div class="flex items-center p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition duration-200">
                    <input type="checkbox" 
                           class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded"
                           id="tag-editor-${tag.id}"
                           data-tag-id="${tag.id}"
                           ${this.isSelected(tag.id) ? 'checked' : ''}>
                    <label for="tag-editor-${tag.id}" class="ml-3 flex-1 cursor-pointer">
                        <span class="font-medium text-gray-900">${tag.name}</span>
                        <span class="text-sm text-gray-500 ml-2">(${tag.slug})</span>
                    </label>
                </div>
            `).join('');
        }

        filterTags(searchTerm) {
            const filtered = this.allTags.filter(tag => 
                tag.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                tag.slug.toLowerCase().includes(searchTerm.toLowerCase())
            );
            
            const container = document.getElementById('tags-list-editor');
            if (container) {
                container.innerHTML = this.renderTagsList(filtered);
            }
        }

        isSelected(tagId) {
            return this.selectedTags.some(tag => tag.id === tagId);
        }

        confirmTagSelection() {
            // Recopilar tags seleccionados
            const checkboxes = document.querySelectorAll('#tags-list-editor input[type="checkbox"]:checked');
            this.selectedTags = [];
            
            checkboxes.forEach(checkbox => {
                const tagId = parseInt(checkbox.dataset.tagId);
                const tag = this.allTags.find(t => t.id === tagId);
                if (tag) {
                    this.selectedTags.push(tag);
                }
            });

            this.updateSelectedTagsDisplay();
            
            // Cerrar el modal
            const modal = document.getElementById('tag-selector-modal');
            if (modal) {
                modal.remove();
            }
        }

        updateSelectedTagsDisplay() {
            const display = document.getElementById('selected-tags-display');
            if (!display) return;

            if (this.selectedTags.length > 0) {
                display.innerHTML = `
                    <h6 class="font-medium text-gray-700 mb-2">Tags que se asociarán al sitio (${this.selectedTags.length}):</h6>
                    <div class="flex flex-wrap gap-2">
                        ${this.selectedTags.map(tag => `
                            <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-green-100 text-green-800">
                                ${tag.name}
                            </span>
                        `).join('')}
                    </div>
                `;
            } else {
                display.innerHTML = `
                    <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                        <p class="text-yellow-800 text-sm">
                            <i class="fas fa-exclamation-triangle mr-2"></i>
                            Se quitarán todos los tags del sitio al guardar.
                        </p>
                    </div>
                `;
            }
        }

        getSelectedTags() {
            return [...this.selectedTags];
        }
    }

    // Función para exportar sitios a CSV
    function exportSitesToCSV() {
        // Construir la URL con los filtros actuales
        const params = new URLSearchParams({
            sort_by: currentFilters.sort_by,
            sort_order: currentFilters.sort_order
        });

        if (currentFilters.search) params.append('search', currentFilters.search);
        if (currentFilters.city_id) params.append('city_id', currentFilters.city_id);
        if (currentFilters.province_id) params.append('province_id', currentFilters.province_id);
        if (currentFilters.state_id) params.append('state_id', currentFilters.state_id);
        if (currentFilters.visible !== '') params.append('visible', currentFilters.visible === 'true' ? 'true' : 'false');
        if (currentFilters.date_from) params.append('date_from', currentFilters.date_from);
        if (currentFilters.date_to) params.append('date_to', currentFilters.date_to);
        if (currentFilters.tag_ids.length > 0) params.append('tag_ids', currentFilters.tag_ids.join(','));

        const exportUrl = `{{ url_for("site_api.export_sites_csv") }}?${params.toString()}`;
        
        // Mostrar indicador de carga
        const exportBtn = document.getElementById('export-csv-btn');
        const originalText = exportBtn.innerHTML;
        exportBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Exportando...';
        exportBtn.disabled = true;
        
        // Crear un enlace temporal para descargar el archivo
        const link = document.createElement('a');
        link.href = exportUrl;
        link.download = ''; // El nombre del archivo se establecerá desde el servidor
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        // Restaurar el botón después de un breve delay
        setTimeout(() => {
            exportBtn.innerHTML = originalText;
            exportBtn.disabled = false;
        }, 2000);
    }
</script>
{% endblock %}
