{% extends "shared/layout.html" %}

{% block content %}
<!-- CSS de Leaflet (necesario para que el mapa se vea correctamente) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />


<div class="contenido">
    
    
    <!-- Div para mostrar el mapa -->
    <div id="map-container" class="map-container"></div>
    
    
    <div class="grid-items">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>
</div>

<!-- Scripts necesarios para el mapa (solo visualización, sin funcionalidad de clic) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='js/map_handler.js') }}"></script>
<script>
  window.SITES_FOR_MAP = {{ (sites_for_map or []) | tojson }};
</script>
<script src="{{ url_for('static', filename='js/sidebar_fix.js') }}"></script>
<script src="{{ url_for('static', filename='js/home.js') }}"></script>
{% endblock %}
