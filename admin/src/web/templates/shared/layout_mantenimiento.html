<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mantenimiento{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Barlow', sans-serif;
        }
        .maintenance-animation {
            animation: float 3s ease-in-out infinite;
            padding-top: 30px; /* Espacio extra para evitar que se salga */
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); } /* Reducido de -20px a -15px */
        }
        .pulse-slow {
            animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
    
    {% block head %}{% endblock %}
</head>
<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 min-h-screen">
    
    <!-- Header -->
    <header class="bg-white shadow-lg border-b border-gray-200">
        <div class="flex items-center justify-between px-6 py-4">
            <!-- Espacio vacío para balancear el diseño -->
            <div class="flex-shrink-0 w-32"></div>
            
            <!-- Logo centrado -->
            <div class="flex-1 flex justify-center">
                <img src="{{ url_for('static', filename='img/logo.png') }}" 
                    alt="HeritageTech Logo" 
                    class="h-20 w-20">
            </div>
            
            <!-- Botón de acceso al login -->
            <div class="flex-shrink-0">
                <a href="{{ url_for('main.index') }}" 
                   class="inline-flex items-center px-6 py-3 bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-semibold rounded-xl transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                              d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <!-- Contenido principal -->
    <div class="flex items-center justify-center py-8" style="min-height: calc(100vh - 112px);">
        <div class="w-full max-w-4xl px-4">
            {% block content %}
            <!-- El contenido se insertará aquí -->
            {% endblock %}
        </div>
    </div>

    <!-- Scripts opcionales -->
    {% block scripts %}{% endblock %}
</body>
</html>
