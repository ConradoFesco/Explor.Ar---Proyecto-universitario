{% extends "layout.html" %}

{% block title %}Feature Flags{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto bg-white shadow-lg rounded-xl p-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Gestión de Feature Flags</h2>

    <!-- Mensaje general -->
    <p class="text-gray-600 mb-6">
        Aquí podés activar o desactivar funcionalidades del sistema sin necesidad de despliegues.
    </p>

    <!-- Contenedor de flags -->
    <div id="flags-container" class="space-y-6">
        <!-- Los flags se renderizan desde JS -->
    </div>
</div>

<!-- Modal de confirmación -->
<div id="confirmModal" class="fixed inset-0 bg-gray-700 bg-opacity-50 flex items-center justify-center hidden z-50">
    <div class="bg-white rounded-lg shadow-lg w-96 p-6">
        <h3 class="text-lg font-semibold text-gray-800 mb-3">Confirmar cambio</h3>
        <p class="text-gray-600 mb-4" id="confirmMessage"></p>
        <div class="flex justify-end space-x-4">
            <button id="cancelBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">Cancelar</button>
            <button id="confirmBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Confirmar</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", async () => {
    const container = document.getElementById("flags-container");
    const modal = document.getElementById("confirmModal");
    const confirmMessage = document.getElementById("confirmMessage");
    const confirmBtn = document.getElementById("confirmBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    let selectedFlag = null;

    // Simulación temporal de los flags (después se traerán desde backend)
    const featureFlags = [
        {
            key: "admin_maintenance_mode",
            name: "Modo mantenimiento - Administración",
            description: "Deshabilita temporalmente el panel de administración.",
            status: false,
            updated_by: "System Admin",
            updated_at: "2025-10-06 14:30"
        },
        {
            key: "portal_maintenance_mode",
            name: "Modo mantenimiento - Portal público",
            description: "Pone el portal público en mantenimiento.",
            status: false,
            updated_by: "System Admin",
            updated_at: "2025-10-06 14:30"
        },
        {
            key: "reviews_enabled",
            name: "Permitir reseñas",
            description: "Habilita o deshabilita la creación de reseñas.",
            status: true,
            updated_by: "System Admin",
            updated_at: "2025-10-06 14:30"
        }
    ];

    // Renderizar los flags
    featureFlags.forEach(flag => {
        const card = document.createElement("div");
        card.className = "border rounded-lg p-4 flex justify-between items-center hover:bg-gray-50 transition";

        card.innerHTML = `
            <div>
                <h3 class="font-semibold text-gray-800">${flag.name}</h3>
                <p class="text-gray-500 text-sm mb-2">${flag.description}</p>
                <p class="text-xs text-gray-400">Última modificación: ${flag.updated_by} - ${flag.updated_at}</p>
            </div>
            <label class="inline-flex items-center cursor-pointer">
                <input type="checkbox" class="sr-only peer" ${flag.status ? "checked" : ""}>
                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer 
                            peer-checked:after:translate-x-full peer-checked:after:border-white 
                            after:content-[''] after:absolute after:top-[2px] after:left-[2px] 
                            after:bg-white after:border-gray-300 after:border after:rounded-full 
                            after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600 relative">
                </div>
            </label>
        `;

        // Evento toggle con confirmación
        const checkbox = card.querySelector("input");
        checkbox.addEventListener("change", () => {
            selectedFlag = flag;
            confirmMessage.textContent = flag.status
                ? `¿Deseas desactivar "${flag.name}"?`
                : `¿Deseas activar "${flag.name}"?`;
            modal.classList.remove("hidden");
        });

        container.appendChild(card);
    });

    // Botones del modal
    cancelBtn.addEventListener("click", () => {
        modal.classList.add("hidden");
        selectedFlag = null;
    });

    confirmBtn.addEventListener("click", async () => {
        modal.classList.add("hidden");
        if (selectedFlag) {
            selectedFlag.status = !selectedFlag.status;
            // Aquí después haremos un fetch PUT al backend
            console.log("Actualizando flag:", selectedFlag.key, selectedFlag.status);
            location.reload();
        }
    });
});
</script>
{% endblock %}
