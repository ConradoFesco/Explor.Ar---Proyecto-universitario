<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Mi Aplicación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif; 
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-effect { 
            backdrop-filter: blur(10px); 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
        }
        .hover-scale { 
            transition: transform 0.3s ease, box-shadow 0.3s ease; 
        }
        .hover-scale:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); 
        }
        input button{
            margin-top: 15px;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="glass-effect rounded-2xl p-8 w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-white bg-opacity-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Bienvenido</h1>
            <p class="text-white text-opacity-80">Accede a tu cuenta</p>
        </div>

        <form id="loginForm" class="space-y-4 mb-6">
            <input type="text" id="mail" placeholder="Correo electrónico"class="w-full py-3 px-4 rounded-lg focus:outline-none" required>
            <input type="password" id="password" placeholder="Contraseña" class="w-full py-3 px-4 rounded-lg focus:outline-none" required>
            <button type="submit"class="w-full bg-white text-gray-800 font-semibold py-3 px-6 rounded-lg hover-scale hover:bg-gray-50 transition-colors duration-300">Iniciar Sesión</button>
        </form>

        <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault(); // evita que el form recargue la página

            const mail = document.getElementById("mail").value;
            const password = document.getElementById("password").value;

            try {
                const res = await fetch("/api/login", { // <- endpoint del blueprint
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ mail, password })
                });

                const data = await res.json();

                if (res.ok) {
                    alert(data.message); 
                    window.location.href = "/home"; // redirige a home si login correcto
                } else {
                    alert(data.error);
                }
            } catch (err) {
                console.error("Error:", err);
                alert("Ocurrió un error al conectar con el servidor");
            }
        });
        </script>
        
    </div>
</body>
</html>
