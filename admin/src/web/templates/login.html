<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Mi Aplicación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif; 
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-effect { 
            backdrop-filter: blur(10px); 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
        }
        .hover-scale { 
            transition: transform 0.3s ease, box-shadow 0.3s ease; 
        }
        .hover-scale:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); 
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">

    <!-- Modal fondo -->
    <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <!-- Card glass -->
        <div class="max-w-md w-full glass-effect rounded-2xl shadow-2xl p-8 text-center relative">
            <div class="w-16 h-16 bg-white bg-opacity-30 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Bienvenido</h1>
            <p class="text-white text-opacity-80 mb-6">Accede a tu cuenta</p>

            <form id="loginForm" class="space-y-4 mb-6">
                <input type="text" id="mail" placeholder="Correo electrónico"
                       class="w-full py-3 px-4 rounded-lg focus:outline-none">
                <input type="password" id="password" placeholder="Contraseña"
                       class="w-full py-3 px-4 rounded-lg focus:outline-none">
                <button type="submit"
                        class="w-full bg-white text-gray-800 font-semibold py-3 px-6 rounded-lg hover-scale hover:bg-gray-50 transition-colors duration-300">
                    Iniciar Sesión
                </button>
                <p id="loginMsg" class="mt-2 text-sm hidden"></p>
            </form>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById("loginForm");
        const loginMsg = document.getElementById("loginMsg");

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault(); 
            const mail = document.getElementById("mail").value;
            const password = document.getElementById("password").value;

            loginMsg.classList.add("hidden"); // reset

            try {
                const res = await fetch("/api/login", { 
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ mail, password })
                });

                const data = await res.json();

                if (res.ok) {
                    loginMsg.textContent = "¡Bienvenido!";
                    loginMsg.classList.remove("hidden");
                    loginMsg.classList.remove("text-red-500");
                    loginMsg.classList.add("text-green-500");

                    // Redirigir luego de 1.5s
                    setTimeout(() => window.location.href = "/home", 1500);
                } else {
                    loginMsg.textContent = data.error;
                    loginMsg.classList.remove("hidden");
                    loginMsg.classList.remove("text-green-500");
                    loginMsg.classList.add("text-red-500");
                }
            } catch (err) {
                loginMsg.textContent = "Ocurrió un error al conectar con el servidor";
                loginMsg.classList.remove("hidden");
                loginMsg.classList.remove("text-green-500");
                loginMsg.classList.add("text-red-500");
            }
        });

    </script>

</body>
</html>
