<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} Mi Página {% endblock %}</title>
    {% block head %}
   <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"/> 
    {% endblock %}
</head>

<body>

    <header>
        <nav>
            <ul>
                <li><a href="#">Mi App</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        {% block footer %} &copy; {{ current_year }} Aplicación {% endblock %}
    </footer>
</body>
</html>
