{% extends "layout.html" %}

{% block title %}Editar Usuario{% endblock %}

{% block content %}
<main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="bg-white shadow-sm rounded-lg border border-gray-200">
        <div class="px-6 py-4 border-b border-gray-200">
            <h3 class="text-lg font-medium text-gray-900">Editar Usuario</h3>
        </div>
        
        <!-- Formulario sin action directo, lo manejamos con JS para llamar al API -->
        <form id="editUserForm" class="p-6 space-y-6">
            <!-- Nombre -->
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
                    Nombre
                </label>
                <input type="text" 
                       id="name" 
                       name="name" 
                       value="{{ user.name }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <!-- Apellido -->
            <div>
                <label for="last_name" class="block text-sm font-medium text-gray-700 mb-1">
                    Apellido
                </label>
                <input type="text" 
                       id="last_name" 
                       name="last_name" 
                       value="{{ user.last_name }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <!-- Email -->
            <div>
                <label for="mail" class="block text-sm font-medium text-gray-700 mb-1">
                    Email
                </label>
                <input type="email" 
                       id="mail" 
                       name="mail" 
                       value="{{ user.mail }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <!-- Rol -->
            <div>
                <label for="role" class="block text-sm font-medium text-gray-700 mb-1">
                    Rol
                </label>
                <select id="role" name="role"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <option value="Usuario" {% if user.role == 'Usuario' %}selected{% endif %}>Usuario</option>
                    <option value="Moderador" {% if user.role == 'Moderador' %}selected{% endif %}>Moderador</option>
                    <option value="Administrador" {% if user.role == 'Administrador' %}selected{% endif %}>Administrador</option>
                </select>
            </div>

            <!-- Estado Activo -->
            <div class="flex items-center">
                <input type="checkbox"
                       id="active"
                       name="active"
                       {% if user.active %}checked{% endif %}
                       class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                <label for="active" class="ml-2 block text-sm text-gray-700">
                    Usuario activo
                </label>
            </div>

            <!-- Estado Bloqueado -->
            <div class="flex items-center">
                <input type="checkbox" 
                       id="blocked" 
                       name="blocked" 
                       {% if user.blocked %}checked{% endif %}
                       class="h-4 w-4 text-red-600 focus:ring-red-500 border-gray-300 rounded">
                <label for="blocked" class="ml-2 block text-sm text-gray-700">
                    Usuario bloqueado
                </label>
            </div>

            <!-- Info adicional -->
            <div class="bg-gray-50 rounded-lg p-4 space-y-2">
                <p class="text-sm text-gray-600">
                    <span class="font-medium">ID:</span> {{ user.id }}
                </p>
                <p class="text-sm text-gray-600">
                    <span class="font-medium">Fecha de creación:</span> 
                    {{ user.created_at.strftime("%d/%m/%Y %H:%M") if user.created_at else 'N/A' }}
                </p>
            </div>

            <!-- Botones -->
            <div class="flex items-center justify-end space-x-3 pt-4 border-t border-gray-200">
                <a href="/users" 
                   class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition duration-200">
                    Cancelar
                </a>
                <button type="submit"
                        class="px-4 py-2 text-sm font-medium text-white bg-blue-600 border border-transparent rounded-lg hover:bg-blue-700 transition duration-200">
                    Guardar cambios
                </button>
            </div>
        </form>
    </div>
</main>
{% endblock %}

{% block scripts %}
<script>
document.getElementById("editUserForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    // Valores originales del usuario
    const originalData = {
        name: "{{ user.name }}",
        last_name: "{{ user.last_name }}",
        mail: "{{ user.mail }}",
        role: "{{ user.role or '' }}",
        active: '{{ "true" if user.active else "false" }}',
        blocked: '{{ "true" if user.blocked else "false" }}'
    };

    originalData.active = (originalData.active === 'true');
    originalData.blocked = (originalData.blocked === 'true');

    // Valores actuales del formulario
    const currentData = {
        name: document.getElementById('name').value,
        last_name: document.getElementById('last_name').value,
        mail: document.getElementById('mail').value,
        role: document.getElementById('role').value,
        active: document.getElementById('active').checked,
        blocked: document.getElementById('blocked').checked
    };

    // Solo incluir campos que cambiaron
    const changedFields = {};
    for (let key in currentData) {
        if (currentData[key] !== originalData[key]) {
            changedFields[key] = currentData[key];
        }
    }

    // Si no hay cambios, no hacer nada
    if (Object.keys(changedFields).length === 0) {
        alert('No hay cambios para guardar');
        return;
    }

    const formData = {
        data_user: {
            id: 2, // NOTA: Reemplazar con el ID del usuario que está editando (admin logueado)
        },
        data_new: changedFields
    };

    try {
        const response = await fetch(`/api/users/{{ user.id }}`, {
            method: "PUT",
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });

        const data = await response.json();
        if (response.ok) {
            alert("Usuario actualizado correctamente");
            // Forzar recarga completa para ver los cambios
            window.location.replace("/users");
        } else {
            alert("Error: " + (data.error || "No se pudo actualizar el usuario"));
        }
    } catch (err) {
        alert("Error en la conexión con el servidor: " + err.message);
    }
});
</script>
{% endblock %}
